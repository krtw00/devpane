name: CI

on:
  pull_request:
    branches: [main, ai-develop]
  push:
    branches: [main, ai-develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm build

      - name: Test
        run: pnpm test

  deploy:
    needs: check
    if: github.ref == 'refs/heads/ai-develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 133.18.124.16
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/devpane
            git pull --ff-only origin ai-develop
            pnpm install --frozen-lockfile
            pnpm build
            systemctl --user restart devpane.service
            echo "deploy complete: $(git log --oneline -1)"
